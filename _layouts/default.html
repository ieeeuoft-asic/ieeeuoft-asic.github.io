<!doctype html>
<html lang="{{ site.locale | default: 'en' }}" class="no-js asic-html">
  <head>
    <meta charset="utf-8">
    {% include seo.html %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';</script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
    {% include head/custom.html %}
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }} Feed" href="{{ '/feed.xml' | relative_url }}">
  </head>
  <body class="asic-shell layout-{{ page.layout | default: 'default' }}">
    <canvas id="bg-grid" class="asic-bg-canvas" aria-hidden="true"></canvas>
    <div class="asic-shell__content">
      {% include masthead.html %}
      <main id="main" class="asic-main" role="main">
        {{ content }}
      </main>
      {% include footer.html %}
    </div>
    <script src="{{ '/assets/js/bg-grid.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/reveal.js' | relative_url }}" defer></script>
    <script>
      (function () {
        var toggle = document.querySelector('.asic-masthead__toggle');
        var nav = document.getElementById('asic-nav');
        if (!toggle || !nav) return;
        toggle.addEventListener('click', function () {
          var open = nav.classList.toggle('is-open');
          toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      })();
    </script>
    {{ page.scripts }}
  </body>
</html>
